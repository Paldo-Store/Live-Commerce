spring:
  application:
    name: user
  profiles:
    active: dev
  config:
    import: "configserver:http://localhost:18080"
  # 안 넣으면 'JavaMailSender' Bean을 찾지못함
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 0
eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

message: "default message" # config server를 통과하지 않을 때

management:
  endpoints:
    web:
      exposure:
        include: refresh


