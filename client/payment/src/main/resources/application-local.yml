spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/live_commerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cloud:
    config:
      enabled: false

eureka:
  client:
    enabled: false

server:
  port: 19094

gateway:
  base-url: http://localhost:19091

frontend:
  base-url: http://localhost:3000

# 실제 카카오페이 설정 (테스트용 키)
kakao:
  pay:
    secret-key: ${KAKAO_PAY_SECRET_KEY:DEV9574305972BC78D5A6A2C2FD46BAC3B9}
    cid: ${KAKAO_PAY_CID:TC0ONETIME}

toss:
  pay:
    secret-key: ${TOSS_PAY_SECRET_KEY}

logging:
