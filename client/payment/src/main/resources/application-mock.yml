spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/live_commerce
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

server:
  port: 19094

gateway:
  base-url: http://localhost:19091

frontend:
  base-url: http://localhost:3000

kakao:
  pay:
    secret-key: ${KAKAO_PAY_SECRET_KEY:mock-kakao-secret}
    cid: ${KAKAO_PAY_CID:TC0ONETIME}

toss:
  pay:
    secret-key: ${TOSS_PAY_SECRET_KEY:mock-toss-secret}

logging:
  level:
    com.live_commerce.payment: DEBUG
