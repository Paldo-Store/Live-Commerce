spring:
  application:
    name: product
  profiles:
    active: dev
  config:
    import: "configserver:http://localhost:18080"

server:
  port: 0
eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

message: "default message" # config server를 통과하지 않을 때

management:
  endpoints:
    web:
      exposure:
        include: refresh


