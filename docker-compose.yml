services:

  config:
    build:
      context: ./server/config
    container_name: config
    ports:
      - "18080:18080"
    networks:
      - 8do-network

  eureka:
    build:
      context: ./server/eureka
    container_name: eureka
    hostname: eureka
    ports:
      - "8761:8761"
    networks:
      - 8do-network
    depends_on:
      - config
    environment:
      - SPRING_APPLICATION_NAME=eureka
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Dfile.encoding=UTF-8
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/eureka/apps" ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ./server/gateway
    container_name: gateway
    ports:
      - "19091:19091"
    networks:
      - 8do-network
    depends_on:
      - config
      - eureka
    env_file:
      - ./server/gateway/.env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Dfile.encoding=UTF-8

  company:
    build:
      context: ./client/company
    container_name: company
    ports:
      - "19020:19020"
    networks:
      - 8do-network
    depends_on:
      - config
      - postgres
      - eureka
    env_file:
      - ./client/company/.env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Dfile.encoding=UTF-8

