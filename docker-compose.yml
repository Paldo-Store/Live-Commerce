      config:
        condition: service_started
      postgres:
        condition: service_started
    env_file:
      - ./client/livebroadcast/.env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Dfile.encoding=UTF-8

