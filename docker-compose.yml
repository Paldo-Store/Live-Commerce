#    container_name: rabbitmq
#    restart: unless-stopped
#    ports:
#      - "5672:5672"
#      - "15672:15672"
#    environment:
#      RABBITMQ_DEFAULT_USER: guest
#      RABBITMQ_DEFAULT_PASS: guest
#    networks:
#      - logistics-network

networks:
  logistics-network:

volumes:
  postgres-data:
    name: postgres_data
  redis_data:
    name: redis_data
