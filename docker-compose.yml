services:
  postgres:
    image: postgres:15
    container_name: live-commerce-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: livecommerce #logistics
      POSTGRES_USER: postgres #postgres
      POSTGRES_PASSWORD: 8dostore #8dostore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - logistics-network

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - logistics-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - logistics-network
#    environment:
#      - JAVA_OPTS=-XX:UseSVE=0

#  rabbitmq:
#    image: rabbitmq:management
#    container_name: rabbitmq
#    restart: unless-stopped
#    ports:
#      - "5672:5672"
#      - "15672:15672"
#    environment:
#      RABBITMQ_DEFAULT_USER: guest
#      RABBITMQ_DEFAULT_PASS: guest
#    networks:
#      - logistics-network

networks:
  logistics-network:

volumes:
  postgres-data:
    name: postgres_data
  redis_data:
    name: redis_data
