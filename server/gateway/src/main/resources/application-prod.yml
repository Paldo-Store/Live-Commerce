server:
  port: 19091

spring:
  application:
    name: gateway
  config:
    import: optional:file:.env[.properties]
  main:
    web-application-type: reactive
  webflux:
    static-path-pattern: /swagger-ui/**
  cloud:
    gateway:
      forwarded-headers-strategy: framework
      discovery:
        locator:
          enabled: true
      default-filters:
        - PreserveHostHeader=true
      routes:
        - id: ai
          uri: lb://ai
          predicates:
            - Path=/api/v1/ai/**, /api-docs-ai
        - id: chat
          uri: lb://chat
          predicates:
            - Path=/api/v1/chattings/**, /api-docs-chat
        - id: company
          uri: lb://company
          predicates:
            - Path=/api/v1/companies/**, /api-docs-company
        - id: coupon
          uri: lb://coupon
          predicates:
            - Path=/api/v1/coupon-policies/**, /api/v1/issued-coupons/**, /api-docs-coupon
        - id: livebroadcast
          uri: lb://livebroadcast
          predicates:
            - Path=/api/v1/livebroadcasts/**, /ws/viewers/**, /api-docs-live-broadcast
        - id: notification
          uri: lb://notification
          predicates:
            - Path=/api/v1/notifications/**, /api-docs-notification
        - id: order
          uri: lb://order
          predicates:
            - Path=/api/v1/orders/**, /api-docs-order
        - id: payment
          uri: lb://payment
          predicates:
            - Path=/api/v1/payments/**, /api-docs-payment
        - id: product
          uri: lb://product
          predicates:
            - Path=/api/v1/products/**, /api/v1/inventories/**, /api-docs-product
        - id: user
          uri: lb://user
          predicates:
            - Path=/api/v1/users/**, /api/v1/auth/**, /v3/api-docs/user, /api-docs-user


eureka:
  client:
    service-url:
      defaultZone: http://eureka:19090/eureka/

service:
  jwt:
    secret-key: ${JWT_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
