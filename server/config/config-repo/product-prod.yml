server:
  port: 19070

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: refresh
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

spring:
  application:
    name: product
  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM}
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        default_schema: products
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >
          inventory-decrease:com.live_commerce.product.product.infrastructure.kafka.event.OrderRequestedInventoryEvent,
          inventory-decreased:com.live_commerce.product.product.infrastructure.kafka.event.InventoryDecreasedEvent
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
        spring.json.type.mapping: >
          inventory-decrease:com.live_commerce.product.product.infrastructure.kafka.event.OrderRequestedInventoryEvent,
          inventory-decreased:com.live_commerce.product.product.infrastructure.kafka.event.InventoryDecreasedEvent
    listener:
      ack-mode: MANUAL_IMMEDIATE

  redis:
    host: redis
    port: 6379

springdoc:
  api-docs:
    path: /v3/api-docs/product