server:
  port: 19110

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/

spring:
  application:
    name: notification
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        default_schema: notifications
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: notification-group  # 소비자 그룹 ID (필요에 따라 설정)
    producer:
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      key-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoint:
    prometheus:
      access: unrestricted
    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include: [ health, info, prometheus ]

  prometheus:
    metrics.export.enabled: true

  metrics:
    distribution:
      # 1) 히스토그램
      percentiles-histogram:
        "[http.server.requests]": true        # 대괄호 → IDE 경고 X
      # 2) 퍼센타일
      percentiles:
        "[http.server.requests]": 0.95,0.99
      # 3) SLO 버킷
      slo:
        "[http.server.requests]": 100ms,300ms,500ms,1s,3s
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

gateway:
  base-url: http://gateway:19091

springdoc:
  api-docs:
    path: /v3/api-docs/notification