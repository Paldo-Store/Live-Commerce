server:
  port: 19030

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/

spring:
  application:
    name: order
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        default_schema: orders
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >
          payment-completed:com.live_commerce.order.kafkaOrder.payment.PaymentCompletedEvent,
          coupon-used:com.live_commerce.order.kafkaOrder.coupon.CouponUsedEvent,
          inventory-decrease:com.live_commerce.order.kafkaOrder.product.OrderRequestedInventoryEvent
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
        spring.json.type.mapping: >
          payment-completed:com.live_commerce.order.kafkaOrder.payment.PaymentCompletedEvent,
          coupon-used:com.live_commerce.order.kafkaOrder.coupon.CouponUsedEvent,
          inventory-decrease:com.live_commerce.order.kafkaOrder.product.OrderRequestedInventoryEvent
    listener:
      ack-mode: MANUAL_IMMEDIATE

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

gateway:
  base-url: http://gateway:19091

springdoc:
  api-docs:
    path: /v3/api-docs/order