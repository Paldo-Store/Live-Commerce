server:
  port: 19070

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/
management:
  endpoints:
    web:
      exposure:
        include: refresh

spring:
  application:
    name: product
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        default_schema: products
  datasource:
    url: jdbc:postgresql://localhost:5432/livecommerce
    username: postgres
    password: 8dostore
    driver-class-name: org.postgresql.Driver
  redis:
    host: localhost
    port: 6379
  kafka:
    consumer:
      reconnect-backoff-ms: 5000
      reconnect-backoff-max-ms: 30000

gateway:
  base-url: http://localhost:19091

springdoc:
  api-docs:
    path: /v3/api-docs/product