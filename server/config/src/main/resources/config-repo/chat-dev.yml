server:
  port: 19040

eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

spring:
  application:
    name: chat
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
        default_schema: chats
  datasource:
    url: jdbc:postgresql://localhost:5432/livecommerce
    username: postgres
    password: 8dostore
    driver-class-name: org.postgresql.Driver

ai-service:
  url: http://gateway-server #http://gateway 로 바꾸어볼 것. 에러나면

internal:
  secret: ${INTERNAL_SECRET}

gateway:
  base-url: http://localhost:19091

springdoc:
  api-docs:
    path: /v3/api-docs/chat