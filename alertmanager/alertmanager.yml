global:
  resolve_timeout: 5m

route:
  receiver: 'slack-notify'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  routes:
    - match:
        service: 'notification-service'
      receiver: 'slack-notify-notification'
      group_wait: 5s
      group_interval: 1m
      repeat_interval: 20m

receivers:
  - name: 'slack-notify'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/XXX/YYY/ZZZ'
        channel: '#alerts'
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: 'slack-notify-notification'
    slack_configs:
      - api_url: {{ env "NOTIFICATION_SLACK_WEBHOOK_URL" }}
        channel: '#notification-alerts'
        title: '[Notification] {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'
